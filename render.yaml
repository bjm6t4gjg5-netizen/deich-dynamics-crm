# Render Blueprint — Docker-runtime deploy.
#
# Why Docker instead of Render's native Node runtime?
#   Native Node syncs only git-tracked files from build → runtime container.
#   `client/dist/` is in .gitignore, so it never reaches the runtime container
#   even though `npm run build` produces it. Building inside Docker via
#   explicit COPY steps sidesteps this — the image contains exactly what we
#   tell it to contain, .gitignore is irrelevant.
#
# Deploy steps (one-time):
#   1. Render → New → Blueprint → connect this repo → Apply.
#   2. After first deploy, set CLIENT_URL to your Render URL.
#   3. Trigger a manual redeploy (Settings → Manual Deploy → "Deploy latest").

services:
  - type: web
    name: deich-dynamics-crm
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false   # Set manually to your Render URL once provisioned
      - key: MAIL_FROM_DEFAULT
        value: noreply@deich-dynamics.com
      - key: MAIL_FROM_NAME_DEFAULT
        value: Deich Dynamics CRM
